spring.application.name=moviedata

# Database - uses environment variables, falls back to local defaults
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/movieboxoffice}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server port - Railway sets PORT env var automatically
server.port=${PORT:8080}

# SQL initialization (runs data.sql on startup)
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
